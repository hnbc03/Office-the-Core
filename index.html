<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office the Core - A Chuối</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="fixed top-6 left-8 z-50">
        <input type="text" id="searchInput" placeholder="Search..." 
               class="bg-[#171717] text-sm text-gray-400 px-4 py-2 rounded-full border-none outline-none w-48 focus:ring-1 focus:ring-blue-500 transition-all">
    </div>

    <header class="fixed top-6 left-1/2 -translate-x-1/2 z-40">
        <nav class="bg-[#171717] px-2 py-2 rounded-full flex items-center space-x-1">
            <button onclick="switchTab('word')" id="tab-word" class="tab-btn px-6 py-1.5 rounded-full text-sm font-bold tracking-widest transition-all">DOCUMENT</button>
            <button onclick="switchTab('excel')" id="tab-excel" class="tab-btn px-6 py-1.5 rounded-full text-sm font-bold tracking-widest transition-all">SPREADSHEET</button>
            <button onclick="switchTab('ppt')" id="tab-ppt" class="tab-btn px-6 py-1.5 rounded-full text-sm font-bold tracking-widest transition-all">PRESENTATION</button>
        </nav>
    </header>

    <div class="flex flex-1 pt-24 pb-32 overflow-hidden">
        <aside class="w-72 px-10 overflow-y-auto hide-scrollbar">
            <div id="sidebarList" class="space-y-6 text-sm">
                </div>
        </aside>

        <main class="flex-1 px-10 overflow-y-auto hide-scrollbar">
            <div id="mainContent" class="max-w-5xl mx-auto">
            </div>
        </main>
    </div>

    <footer class="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-3xl px-6">
        <div class="bg-[#171717] p-3 rounded-2xl border border-white/5">
            <div class="flex space-x-4 mb-2 px-2">
                <span class="text-[13px] text-gray-500 uppercase font-bold self-center">Save to:</span>
                <button onclick="setInputTab('word')" id="input-word" class="text-[13px] font-bold opacity-40 hover:opacity-100 transition-all">DOCUMENT</button>
                <button onclick="setInputTab('excel')" id="input-excel" class="text-[13px] font-bold opacity-40 hover:opacity-100 transition-all">SPREADSHEET</button>
                <button onclick="setInputTab('ppt')" id="input-ppt" class="text-[13px] font-bold opacity-40 hover:opacity-100 transition-all">PRESENTATION</button>
            </div>
            
            <div class="flex items-end space-x-3">
                <textarea id="noteInput" rows="5" placeholder="Enter Title | Content (Use ::: to separate 3 platforms)..." 
                          class="flex-1 bg-transparent border-none outline-none text-sm p-2 resize-none max-h-40 overflow-y-auto text-gray-200"></textarea>
                <button onclick="saveNote()" class="bg-blue-600 hover:bg-blue-500 text-white p-2 rounded-xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13a1 1 0 102 0V9.414l1.293 1.293a1 1 0 001.414-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
